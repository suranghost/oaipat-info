<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Portal - สหวิทยาการเทคโนโลยีการเกษตร</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-gold: #c5a059;
            --accent-dark: #1d1d1f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-gradient); color: var(--text-main); font-family: 'Prompt', sans-serif; min-height: 100vh; padding-bottom: 120px; }

        /* พื้นหลังตกแต่งความหรูหรา (Blurs) */
        .bg-shape { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.4; }
        .shape-1 { width: 400px; height: 400px; background: #e0c3fc; top: -100px; left: -100px; }
        .shape-2 { width: 500px; height: 500px; background: #8ec5fc; bottom: -150px; right: -100px; }

        /* Header Glassmorphism */
        header { padding: 60px 20px; text-align: center; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); position: relative; }
        header h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 10px; }
        header p { font-size: 14px; color: var(--text-muted); font-weight: 300; letter-spacing: 1px; }

        /* Admin Nav */
        .admin-nav { max-width: 1200px; margin: 25px auto 0; padding: 0 20px; display: flex; justify-content: flex-end; gap: 12px; }
        .btn-glass { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 10px 24px; border-radius: 30px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-main); box-shadow: var(--glass-shadow); transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; font-family: 'Prompt', sans-serif; }
        .btn-glass:hover { background: #ffffff; transform: translateY(-2px); }
        .btn-dark { background: var(--accent-dark); color: #ffffff; border: none; }
        .btn-dark:hover { background: #000000; color: #ffffff; }

        /* Grid & Cards */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid-system { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .card-glass { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 35px; box-shadow: var(--glass-shadow); transition: all 0.4s ease; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; position: relative; }
        .card-glass:hover { transform: translateY(-8px); box-shadow: 0 15px 40px rgba(0,0,0,0.08); border-color: rgba(255,255,255,0.8); }
        .card-glass::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--accent-gold), transparent); opacity: 0; transition: opacity 0.4s; }
        .card-glass:hover::before { opacity: 1; }
        
        .card-glass h3 { font-size: 18px; font-weight: 500; margin-bottom: 12px; line-height: 1.4; }
        .card-glass p { font-size: 13.5px; color: var(--text-muted); line-height: 1.6; margin-bottom: 30px; font-weight: 300; }
        .card-link { text-align: center; display: block; padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.03); color: var(--text-main); text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.3s; }
        .card-link:hover { background: var(--accent-dark); color: #ffffff; }
        
        .admin-action { margin-top: 15px; text-align: right; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 15px; display: flex; justify-content: flex-end; gap: 15px; }
        .btn-edit { background: none; border: none; color: var(--accent-gold); font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: 'Prompt'; }
        .btn-edit:hover { color: #a38245; }
        .btn-delete { background: none; border: none; color: #ff3b30; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: 'Prompt'; }
        .btn-delete:hover { color: #d32f2f; }

        /* Webboard Styles */
        .wb-btn { position: fixed; bottom: 40px; right: 40px; padding: 0 25px; height: 60px; background: var(--accent-dark); color: white; border-radius: 30px; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 16px; font-weight: 500; font-family: 'Prompt'; cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.2); z-index: 1000; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .wb-btn:hover { transform: scale(1.05) translateY(-5px); }

        .wb-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 9999; opacity: 0; transition: opacity 0.3s; }
        .wb-modal-overlay.show { display: flex; opacity: 1; }

        .wb-panel { width: 90%; max-width: 800px; height: 85vh; background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; transform: translateY(30px); transition: transform 0.3s ease; }
        .wb-modal-overlay.show .wb-panel { transform: translateY(0); }

        .wb-header { padding: 25px; background: rgba(255,255,255,0.6); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .wb-header h2 { font-size: 20px; font-weight: 500; display: flex; align-items: center; gap: 12px; margin: 0; }
        .wb-close { font-size: 20px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
        .wb-close:hover { color: #ff3b30; }

        .wb-body { flex: 1; overflow-y: auto; padding: 25px; }
        
        .topic-item { background: #ffffff; border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.02); cursor: pointer; transition: all 0.2s; }
        .topic-item:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); }
        .topic-title { font-size: 16px; font-weight: 500; color: var(--accent-dark); margin-bottom: 8px; }
        .topic-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 15px; }
        
        .thread-header { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .thread-title { font-size: 22px; font-weight: 500; margin-bottom: 10px; }
        .thread-desc { font-size: 15px; color: #444; line-height: 1.6; margin-bottom: 15px; }
        
        .comment-box { background: rgba(255,255,255,0.7); border-radius: 16px; padding: 15px 20px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .comment-author { font-size: 13px; font-weight: 600; color: var(--accent-gold); margin-bottom: 5px; }
        .comment-text { font-size: 14px; line-height: 1.5; color: var(--text-main); }
        .comment-time { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: right; }

        .wb-footer { padding: 20px 25px; background: rgba(255,255,255,0.6); border-top: 1px solid var(--glass-border); display: flex; gap: 15px; align-items: center; }
        .wb-input { flex: 1; padding: 14px 20px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.1); outline: none; font-family: 'Prompt'; font-size: 14px; background: #ffffff; }
        .wb-input:focus { border-color: var(--accent-dark); }
        
        .btn-wb-action { background: var(--accent-dark); color: white; border: none; padding: 12px 25px; border-radius: 20px; font-family: 'Prompt'; font-weight: 500; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-wb-action:hover { background: #000; }
        .btn-wb-back { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); padding: 8px 16px; border-radius: 15px; font-family: 'Prompt'; font-size: 13px; cursor: pointer; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-content { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(25px); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,0.15); }
        .modal-content h2 { font-size: 20px; font-weight: 500; margin-bottom: 25px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); outline: none; font-family: 'Prompt'; font-size: 14px; background: rgba(255,255,255,0.7); }
    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <header>
        <h1>ระบบสารสนเทศส่วนงาน</h1>
        <p>สำนักงานบริหารหลักสูตรสหวิทยาการเทคโนโลยีการเกษตร</p>
    </header>

    <div class="admin-nav">
        <button class="btn-glass" id="btn-admin" onclick="openAuth()"><i class="fa-solid fa-fingerprint"></i> โหมดผู้ดูแลระบบ</button>
        <button class="btn-glass btn-dark" id="btn-add" onclick="openAdd()" style="display:none;"><i class="fa-solid fa-plus"></i> สร้างระบบใหม่</button>
    </div>

    <div class="container">
        <div class="grid-system" id="portal-grid"></div>
    </div>

    <div class="wb-btn" onclick="checkWebboardAccess()">
        <i class="fa-solid fa-clipboard-list"></i> กระดานถาม-ตอบ
    </div>

    <div class="modal-overlay" id="modal-wb-auth">
        <div class="modal-content">
            <h2><i class="fa-solid fa-shield-halved" style="color: var(--accent-gold);"></i> ตรวจสอบสิทธิ์การเข้าใช้งาน</h2>
            <p style="font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 20px;">เฉพาะบุคลากรและนักศึกษา สจล. เท่านั้น</p>
            <div class="input-group">
                <label>KMITL Email</label>
                <input type="email" id="wb-email" placeholder="example@kmitl.ac.th">
                <div id="wb-email-err" style="color:#ff3b30; font-size:12px; margin-top:8px; display:none;">กรุณาใช้อีเมลสถาบัน (@kmitl.ac.th) เท่านั้น</div>
            </div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn-glass" onclick="closeWbAuthModal()">ยกเลิก</button>
                <button class="btn-glass btn-dark" onclick="verifyWbEmail()">เข้าสู่บอร์ด</button>
            </div>
        </div>
    </div>

    <div class="wb-modal-overlay" id="wb-overlay">
        <div class="wb-panel">
            <div class="wb-header">
                <h2><i class="fa-solid fa-comments" style="color:var(--accent-gold);"></i> กระดานเว็บบอร์ด <span id="wb-user-tag" style="font-size:12px; color:var(--text-muted); font-weight:300;"></span></h2>
                <i class="fa-solid fa-xmark wb-close" onclick="closeWebboard()"></i>
            </div>
            <div class="wb-body" id="wb-content"></div>
            <div class="wb-footer" id="wb-footer"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-login">
        <div class="modal-content">
            <h2>ยืนยันสิทธิ์แอดมิน</h2>
            <div class="input-group">
                <input type="password" id="pass-val" placeholder="ใส่รหัสผ่าน...">
                <div id="pass-err" style="color:#ff3b30; font-size:12px; margin-top:8px; display:none;">รหัสผ่านไม่ถูกต้อง</div>
            </div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn-glass" onclick="closeModals()">ยกเลิก</button>
                <button class="btn-glass btn-dark" onclick="verifyPass()">ยืนยัน</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="modal-add">
        <div class="modal-content">
            <h2 id="modal-sys-title">เพิ่มข้อมูลระบบ</h2>
            <div class="input-group"><label>ชื่อระบบงาน</label><input type="text" id="sys-name"></div>
            <div class="input-group"><label>รายละเอียด</label><textarea id="sys-desc" rows="2"></textarea></div>
            <div class="input-group"><label>ลิงก์ URL</label><input type="text" id="sys-url"></div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn-glass" onclick="closeModals()">ยกเลิก</button>
                <button class="btn-glass btn-dark" onclick="saveSys()">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let editingId = null; 
        let webboardUser = localStorage.getItem('wb_verified_user') || null;

        // ข้อมูลตั้งต้น
        let defaultSystems = [
            { id: 1, title: "ระบบเสนอชื่อนักศึกษาช่วยงาน / ช่วยสอน (TA)", desc: "เสนอชื่อนักศึกษาเพื่อช่วยเหลืองานสอนและงานส่วนกลาง", url: "https://script.google.com/macros/s/AKfycbz-hKkgYWq_XfNgPNoXWFT8Iz1PN6YLz3UmhZf_Z_V5utpC9gUlTuUhVlSBTOg80KzR/exec" },
            { id: 2, title: "ระบบส่งแบบเสนอชื่ออาจารย์พิเศษ", desc: "ส่งแบบฟอร์มเสนอชื่ออาจารย์พิเศษภายนอกเข้าสอน", url: "https://script.google.com/macros/s/AKfycbxYnmb6pehwIn5ObTQs6aOBHi95FpY-wapxFDVWwrj-XU_H68hUlmNOnge_AJI_JWQv7w/exec" },
            { id: 3, title: "ระบบควบคุมงบประมาณและบันทึกรายจ่าย", desc: "ตรวจสอบวงเงินงบประมาณคงเหลือ และบันทึกรายการค่าใช้จ่ายต่างๆ ของส่วนงาน", url: "https://script.google.com/a/macros/kmitl.ac.th/s/AKfycbzF_k4_AgVZmHijI1CiO8tSDjKpZVy4Eb9aK2PjMtyB1mlTAt9KjMqqn4vXgQlNWzuZuQ/exec" },
            { id: 4, title: "ระบบตรวจสอบงบประมาณรายวิชา", desc: "ดูรายละเอียดงบประมาณที่ได้รับจัดสรรในแต่ละรายวิชาที่รับผิดชอบ", url: "https://script.google.com/a/macros/kmitl.ac.th/s/AKfycbyu5_bUVJZpfSIUzHmvK0yEHlpgl9qPQskpDM32t_XSR3VA24kkKaygixmSO9IPxZlQ/exec" }
        ];

        // [จุดปรับปรุง] เปลี่ยนชื่อ Key เป็น "final_kmitl_systems" เพื่อล้างแคชเก่าที่ทำงานผิดพลาดทั้งหมดออก
        let dataSystems = [];
        try {
            let localData = localStorage.getItem('final_kmitl_systems');
            if (localData && localData !== "undefined" && localData !== "null") {
                dataSystems = JSON.parse(localData);
            } else {
                dataSystems = [...defaultSystems];
                localStorage.setItem('final_kmitl_systems', JSON.stringify(dataSystems));
            }
        } catch (e) {
            console.error("LocalStorage Access Denied", e);
            dataSystems = [...defaultSystems];
        }

        function renderGrid() {
            const grid = document.getElementById('portal-grid'); 
            grid.innerHTML = '';
            dataSystems.forEach(s => {
                grid.innerHTML += `
                    <div class="card-glass">
                        <div><h3>${s.title}</h3><p>${s.desc}</p></div>
                        <div>
                            <a href="${s.url}" target="_blank" class="card-link">เข้าสู่ระบบ</a>
                            ${isAdmin ? `
                                <div class="admin-action">
                                    <button class="btn-edit" onclick="openEdit(${s.id})"><i class="fa-solid fa-pen"></i> แก้ไข</button>
                                    <button class="btn-delete" onclick="delSys(${s.id})"><i class="fa-solid fa-trash"></i> ลบ</button>
                                </div>
                            ` : ''}
                        </div>
                    </div>`;
            });
        }

        function openAuth() { 
            if(isAdmin) { isAdmin = false; document.getElementById('btn-add').style.display='none'; document.getElementById('btn-admin').innerHTML='<i class="fa-solid fa-fingerprint"></i> โหมดผู้ดูแลระบบ'; renderGrid(); }
            else { document.getElementById('pass-err').style.display='none'; document.getElementById('pass-val').value=''; document.getElementById('modal-login').style.display='flex'; }
        }
        function verifyPass() {
            if(document.getElementById('pass-val').value === 'admin1234') { isAdmin = true; document.getElementById('btn-add').style.display='inline-flex'; document.getElementById('btn-admin').innerHTML='<i class="fa-solid fa-unlock"></i> ออกจากระบบ'; closeModals(); renderGrid(); }
            else { document.getElementById('pass-err').style.display='block'; }
        }
        
        function openAdd() { 
            editingId = null; 
            document.getElementById('modal-sys-title').innerText = "เพิ่มข้อมูลระบบ";
            document.getElementById('sys-name').value = '';
            document.getElementById('sys-desc').value = '';
            document.getElementById('sys-url').value = '';
            document.getElementById('modal-add').style.display='flex'; 
        }

        function openEdit(id) {
            editingId = id; 
            const sys = dataSystems.find(x => x.id === id);
            if(sys) {
                document.getElementById('modal-sys-title').innerText = "แก้ไขข้อมูลระบบ";
                document.getElementById('sys-name').value = sys.title;
                document.getElementById('sys-desc').value = sys.desc;
                document.getElementById('sys-url').value = sys.url;
                document.getElementById('modal-add').style.display='flex';
            }
        }

        function closeModals() { 
            document.getElementById('modal-login').style.display='none'; 
            document.getElementById('modal-add').style.display='none'; 
        }
        
        function saveSys() {
            const t = document.getElementById('sys-name').value.trim();
            const d = document.getElementById('sys-desc').value.trim();
            const u = document.getElementById('sys-url').value.trim();
            
            if(t && u) { 
                if(editingId !== null) {
                    const index = dataSystems.findIndex(x => x.id === editingId);
                    if(index !== -1) {
                        dataSystems[index].title = t;
                        dataSystems[index].desc = d;
                        dataSystems[index].url = u;
                    }
                } else {
                    dataSystems.push({id: Date.now(), title: t, desc: d, url: u}); 
                }
                
                // บันทึกและเขียนทับลง LocalStorage ทันที
                localStorage.setItem('final_kmitl_systems', JSON.stringify(dataSystems));
                closeModals(); 
                renderGrid(); 
            } else {
                alert("กรุณากรอกชื่อระบบและลิงก์ URL ให้ครบถ้วน");
            }
        }

        function delSys(id) { 
            if(confirm("ยืนยันการลบระบบนี้?")) {
                dataSystems = dataSystems.filter(x => x.id !== id); 
                localStorage.setItem('final_kmitl_systems', JSON.stringify(dataSystems));
                renderGrid(); 
            }
        }

        // --------------------------------------------------
        // ระบบคัดกรองสิทธิ์กระดานเว็บบอร์ด (KMITL EMAIL VERIFICATION)
        // --------------------------------------------------
        function checkWebboardAccess() {
            if (webboardUser) {
                openWebboard();
            } else {
                document.getElementById('wb-email-err').style.display = 'none';
                document.getElementById('wb-email').value = '';
                document.getElementById('modal-wb-auth').style.display = 'flex';
            }
        }

        function closeWbAuthModal() {
            document.getElementById('modal-wb-auth').style.display = 'none';
        }

        function verifyWbEmail() {
            const emailInput = document.getElementById('wb-email').value.trim().toLowerCase();
            if (emailInput && emailInput.endsWith('@kmitl.ac.th') && emailInput.length > 12) {
                const username = emailInput.split('@')[0];
                webboardUser = username;
                localStorage.setItem('wb_verified_user', username);
                closeWbAuthModal();
                openWebboard();
            } else {
                document.getElementById('wb-email-err').style.display = 'block';
            }
        }

        // --------------------------------------------------
        // ระบบกระดานเว็บบอร์ด (Webboard Logic)
        // --------------------------------------------------
        let webboardData = [
            { id: 101, title: "สอบถามเรื่องเอกสารเบิกจ่าย TA ครับ", author: "student.kmitl", time: "10:00 น.", desc: "ต้องส่งเอกสารชุดไหนบ้างครับ?", comments: [
                { author: "staff.office", text: "ใช้แบบฟอร์ม TA-01 และสำเนาบัตรปชช. ค่ะ", time: "10:15 น." }
            ]},
            { id: 102, title: "ระบบเสนอชื่ออาจารย์พิเศษเข้าไม่ได้", author: "somchai.ch", time: "09:30 น.", desc: "หน้าเว็บฟ้องว่าไม่มีสิทธิ์เข้าถึงครับ", comments: [] }
        ];

        let currentView = 'list'; 
        let activeTopicId = null;

        function openWebboard() {
            document.getElementById('wb-user-tag').innerText = `(ผู้ใช้งาน: ${isAdmin ? 'ผู้ดูแลระบบ' : webboardUser})`;
            document.getElementById('wb-overlay').classList.add('show');
            renderWebboard();
        }

        function closeWebboard() {
            document.getElementById('wb-overlay').classList.remove('show');
            setTimeout(() => { currentView = 'list'; activeTopicId = null; }, 300);
        }

        function renderWebboard() {
            const content = document.getElementById('wb-content');
            const footer = document.getElementById('wb-footer');
            content.innerHTML = '';
            footer.innerHTML = '';

            if(currentView === 'list') {
                if(webboardData.length === 0) {
                    content.innerHTML = `<div style="text-align:center; padding: 40px; color:var(--text-muted);">ยังไม่มีกระทู้ในขณะนี้</div>`;
                } else {
                    webboardData.forEach(topic => {
                        content.innerHTML += `
                            <div class="topic-item" onclick="viewTopic(${topic.id})">
                                <div class="topic-title">${topic.title}</div>
                                <div class="topic-meta">
                                    <span><i class="fa-regular fa-user"></i> ${topic.author}</span>
                                    <span><i class="fa-regular fa-clock"></i> ${topic.time}</span>
                                    <span><i class="fa-regular fa-comments"></i> ${topic.comments.length} ตอบกลับ</span>
                                </div>
                            </div>
                        `;
                    });
                }
                
                footer.innerHTML = `
                    <input type="text" id="new-topic-title" class="wb-input" placeholder="ตั้งหัวข้อกระทู้ใหม่..." onkeyup="if(event.key==='Enter') createTopic()">
                    <button class="btn-wb-action" onclick="createTopic()">ตั้งกระทู้</button>
                `;
            } 
            else if (currentView === 'thread') {
                const topic = webboardData.find(t => t.id === activeTopicId);
                
                content.innerHTML = `
                    <button class="btn-wb-back" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> กลับไปหน้ารวม</button>
                    <div class="thread-header">
                        <div class="thread-title">${topic.title}</div>
                        <div class="topic-meta" style="margin-bottom: 15px;">
                            <span>ตั้งโดย: ${topic.author}</span> | <span>เวลา: ${topic.time}</span>
                        </div>
                        <div class="thread-desc">${topic.desc || 'ไม่มีรายละเอียดเพิ่มเติม'}</div>
                    </div>
                    
                    <div id="comments-section">
                        <h4 style="margin-bottom:15px; font-weight:500;">ความคิดเห็น (${topic.comments.length})</h4>
                        ${topic.comments.length === 0 ? '<p style="color:#888; font-size:13px;">ยังไม่มีผู้ตอบกลับ เป็นคนแรกที่แสดงความคิดเห็นสิ!</p>' : ''}
                        ${topic.comments.map(c => `
                            <div class="comment-box">
                                <div class="comment-author"><i class="fa-solid fa-reply"></i> ${c.author}</div>
                                <div class="comment-text">${c.text}</div>
                                <div class="comment-time">${c.time}</div>
                            </div>
                        `).join('')}
                    </div>
                `;

                footer.innerHTML = `
                    <input type="text" id="new-comment-text" class="wb-input" placeholder="แสดงความคิดเห็น..." onkeyup="if(event.key==='Enter') addComment()">
                    <button class="btn-wb-action" onclick="addComment()">ตอบกลับ</button>
                `;
            }
        }

        function viewTopic(id) { activeTopicId = id; currentView = 'thread'; renderWebboard(); }
        function goBack() { currentView = 'list'; activeTopicId = null; renderWebboard(); }

        function createTopic() {
            const input = document.getElementById('new-topic-title');
            const title = input.value.trim();
            if(!title) return;

            const now = new Date();
            const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0') + ' น.';

            webboardData.unshift({
                id: Date.now(),
                title: title,
                author: isAdmin ? "ผู้ดูแลระบบ" : webboardUser,
                time: timeStr,
                desc: "",
                comments: []
            });
            input.value = '';
            renderWebboard();
        }

        function addComment() {
            const input = document.getElementById('new-comment-text');
            const text = input.value.trim();
            if(!text) return;

            const now = new Date();
            const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0') + ' น.';
            const topic = webboardData.find(t => t.id === activeTopicId);

            topic.comments.push({ author: isAdmin ? "ผู้ดูแลระบบ" : webboardUser, text: text, time: timeStr });
            
            input.value = '';
            renderWebboard();
            const contentBox = document.getElementById('wb-content');
            contentBox.scrollTop = contentBox.scrollHeight; 
        }

        renderGrid();
    </script>
</body>
</html>
